<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Карта конфликтов</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: radial-gradient(circle at 30% 10%, #1a1a2e, #0f0f1a); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 20px; margin: 0; touch-action: pan-y; }
        h1 { font-weight: 300; font-size: 2.4rem; letter-spacing: 4px; margin-bottom: 10px; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(247,151,30,0.2); }
        #controls { background: rgba(26,26,46,0.7); backdrop-filter: blur(10px); padding: 14px 24px; border-radius: 60px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        #controls input { padding: 10px 18px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; flex: 1; min-width: 160px; transition: border 0.3s, box-shadow 0.3s; }
        #controls input::placeholder { color: rgba(255,255,255,0.35); }
        #controls input:focus { outline: none; border-color: #f7971e; box-shadow: 0 0 20px rgba(247,151,30,0.15); }
        #controls button { padding: 10px 22px; border-radius: 40px; border: none; background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; font-weight: 600; font-size: 15px; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 4px 15px rgba(247,151,30,0.3); }
        #controls button:hover { transform: scale(1.04); box-shadow: 0 6px 25px rgba(247,151,30,0.5); }
        #controls button:active { transform: scale(0.96); }
        #graph-container { width: 100%; max-width: 750px; aspect-ratio: 1/1; background: radial-gradient(circle at center, #1e1e32, #12121f); border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 60px rgba(247,151,30,0.03); position: relative; border: 1px solid rgba(255,255,255,0.04); transition: box-shadow 0.4s; touch-action: none; }
        #graph-container:hover { box-shadow: 0 20px 70px rgba(0,0,0,0.8), inset 0 0 80px rgba(247,151,30,0.06); }
        .empty-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.2); font-size: 26px; font-weight: 300; letter-spacing: 2px; pointer-events: none; }
        .link { stroke-opacity: 0.85; stroke-linecap: round; cursor: pointer; transition: stroke-width 0.25s ease, stroke-opacity 0.25s ease, filter 0.3s; filter: drop-shadow(0 0 6px rgba(255,100,50,0.15)); }
        .link:hover { stroke-width: 6px !important; stroke-opacity: 1; filter: drop-shadow(0 0 16px rgba(255,100,50,0.5)); }
        .drag-line { stroke: #ffd200; stroke-width: 3px; stroke-dasharray: 8 6; stroke-opacity: 0.9; pointer-events: none; filter: drop-shadow(0 0 12px rgba(255,210,0,0.6)); }
        .node circle { stroke: rgba(255,255,255,0.6); stroke-width: 2.5px; cursor: grab; transition: r 0.25s ease, filter 0.3s, stroke-width 0.2s, stroke 0.2s; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); }
        .node circle:hover { filter: drop-shadow(0 0 24px rgba(247,151,30,0.5)); stroke-width: 3px; }
        .node circle:active { cursor: grabbing; }
        .node circle.selected { stroke: #ffd700 !important; stroke-width: 4px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.7)); }
        .node text { fill: #fff; font-size: 13px; font-weight: 500; text-anchor: middle; dominant-baseline: central; pointer-events: none; text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6); letter-spacing: 0.3px; }
        .legend { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 24px 40px; justify-content: center; font-size: 14px; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.2); padding: 12px 28px; border-radius: 40px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.04); }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .legend-hint { color: rgba(255,255,255,0.35); font-size: 13px; margin-left: 4px; }
        #top-container { width: 100%; max-width: 750px; margin-top: 24px; background: rgba(26,26,46,0.5); backdrop-filter: blur(8px); border-radius: 24px; padding: 20px 24px 24px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: all 0.3s; }
        #top-container h2 { font-weight: 300; font-size: 1.2rem; letter-spacing: 2px; margin: 0 0 16px 0; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 10px; }
        #top-container h2 span { font-size: 1.4rem; }
        .top-list { display: flex; flex-direction: column; gap: 6px; }
        .top-item { display: flex; align-items: center; padding: 6px 12px; border-radius: 12px; background: rgba(255,255,255,0.03); transition: background 0.2s; gap: 12px; }
        .top-item:hover { background: rgba(255,255,255,0.07); }
        .top-rank { font-weight: 600; font-size: 1rem; min-width: 36px; color: rgba(255,255,255,0.5); text-align: center; }
        .top-rank.gold { color: #ffd700; }
        .top-rank.silver { color: #c0c0c0; }
        .top-rank.bronze { color: #cd7f32; }
        .top-name { flex: 1; font-size: 1rem; font-weight: 500; color: #fff; }
        .top-bar { flex: 2; height: 8px; border-radius: 10px; background: rgba(255,255,255,0.08); overflow: hidden; position: relative; }
        .top-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c); }
        .top-count { font-size: 0.9rem; font-weight: 500; min-width: 40px; text-align: right; color: rgba(255,255,255,0.7); }
        .top-empty { color: rgba(255,255,255,0.25); text-align: center; padding: 20px 0; font-style: italic; letter-spacing: 0.5px; }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #controls { padding: 12px 16px; border-radius: 30px; gap: 8px; max-width: 100%; }
            #controls input { font-size: 16px; padding: 8px 14px; min-width: 120px; }
            #controls button { font-size: 13px; padding: 8px 16px; }
            .legend { font-size: 12px; padding: 10px 18px; gap: 16px; }
            .node text { font-size: 11px; }
            #top-container { padding: 16px; }
            .top-item { flex-wrap: wrap; gap: 6px; }
            .top-bar { flex: 1 1 100%; order: 3; }
            .top-rank { min-width: 28px; }
            .top-count { min-width: 30px; }
        }
    </style>
</head>
<body>
    <h1>🌀 Карта конфликтов</h1>
    <div id="controls">
        <input type="text" id="newName" placeholder="Имя участника" />
        <button id="addPerson">➕ Добавить</button>
    </div>
    <div id="graph-container"><div class="empty-msg">➕ Добавьте участников</div></div>
    <div class="legend">
        <span class="legend-item"><span class="color-dot" style="background:#2ecc71;"></span> мало</span>
        <span class="legend-item"><span class="color-dot" style="background:#f1c40f;"></span> средне</span>
        <span class="legend-item"><span class="color-dot" style="background:#e74c3c;"></span> много</span>
        <span class="legend-hint">⚡ перетащи — создать · на телефоне: 1 тап — выбор, 2-й по другому — конфликт, 3 быстрых тапа — удалить · клик по линии — удалить конфликт</span>
    </div>
    <div id="top-container">
        <h2><span>🏆</span> ТОП по конфликтам</h2>
        <div id="top-list" class="top-list"><div class="top-empty">Нет участников</div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASALrRA9gmF2Oq-mJxg0IPKct_5QNcYFg",
            authDomain: "conflictmap-d967c.firebaseapp.com",
            databaseURL: "https://conflictmap-d967c-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "conflictmap-d967c",
            storageBucket: "conflictmap-d967c.firebasestorage.app",
            messagingSenderId: "499783786939",
            appId: "1:499783786939:web:6991fee08a2852c957a49e",
            measurementId: "G-9HLMN0RJZB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let people = [];
        let conflicts = [];
        let isLocalChange = false;
        let selectedId = null;

        function saveToFirebase() {
            if (isLocalChange) return;
            isLocalChange = true;
            db.ref('data').set({ people, conflicts })
                .then(() => { isLocalChange = false; })
                .catch(err => { console.error(err); isLocalChange = false; });
        }

        function loadFromFirebase() {
            db.ref('data').on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    const newPeople = data.people || [];
                    const newConflicts = data.conflicts || [];
                    if (JSON.stringify(people) !== JSON.stringify(newPeople) ||
                        JSON.stringify(conflicts) !== JSON.stringify(newConflicts)) {
                        people = newPeople;
                        conflicts = newConflicts;
                        drawGraph();
                    }
                } else {
                    if (people.length || conflicts.length) {
                        people = [];
                        conflicts = [];
                        drawGraph();
                    }
                }
            });
        }

        function getColorByCount(count, maxCount) {
            if (maxCount === 0) return '#2ecc71';
            const ratio = count / maxCount;
            const r = Math.min(1, ratio * 2);
            const g = Math.min(1, 2 - ratio * 2);
            const b = 0.2;
            return `rgb(${Math.round(r*255)}, ${Math.round(g*255)}, ${Math.round(b*255)})`;
        }

        function getLinkColor(c1, c2, maxCount) {
            const sum = c1 + c2;
            const maxSum = maxCount * 2;
            if (maxSum === 0) return '#888';
            const ratio = sum / maxSum;
            const r = Math.min(1, ratio * 2);
            const g = Math.min(1, 2 - ratio * 2);
            const b = 0.2;
            return `rgb(${Math.round(r*255)}, ${Math.round(g*255)}, ${Math.round(b*255)})`;
        }

        function getConflictCounts() {
            const count = {};
            people.forEach(p => count[p.id] = 0);
            conflicts.forEach(([a,b]) => {
                count[a] = (count[a]||0) + 1;
                count[b] = (count[b]||0) + 1;
            });
            return count;
        }

        function updateTop() {
            const listEl = document.getElementById('top-list');
            if (!people.length) {
                listEl.innerHTML = '<div class="top-empty">Нет участников</div>';
                return;
            }
            const counts = getConflictCounts();
            const maxCount = Math.max(0, ...Object.values(counts));
            const sorted = people.slice().sort((a,b) => counts[b.id] - counts[a.id]);
            let html = '';
            sorted.forEach((p, index) => {
                const rank = index + 1;
                const count = counts[p.id] || 0;
                const percent = maxCount > 0 ? (count / maxCount) * 100 : 0;
                let rankClass = '', rankSymbol = rank;
                if (rank === 1) { rankClass = 'gold'; rankSymbol = '🥇'; }
                else if (rank === 2) { rankClass = 'silver'; rankSymbol = '🥈'; }
                else if (rank === 3) { rankClass = 'bronze'; rankSymbol = '🥉'; }
                html += `
                    <div class="top-item">
                        <div class="top-rank ${rankClass}">${rankSymbol}</div>
                        <div class="top-name">${p.name}</div>
                        <div class="top-bar"><div class="top-bar-fill" style="width: ${percent}%;"></div></div>
                        <div class="top-count">${count}</div>
                    </div>
                `;
            });
            listEl.innerHTML = html;
        }

        let dragData = null;

        function drawGraph() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth || 700;
            const height = container.clientHeight || 700;
            // Увеличиваем радиус, чтобы имена были дальше друг от друга
            const radius = Math.min(width, height) / 2 - 40; // было -65

            d3.select(container).selectAll('*').remove();

            if (people.length === 0) {
                container.innerHTML = '<div class="empty-msg">➕ Добавьте участников</div>';
                updateTop();
                return;
            }

            const svg = d3.select(container)
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .style('display', 'block');

            const g = svg.append('g')
                .attr('transform', `translate(${width/2}, ${height/2})`);

            const counts = getConflictCounts();
            const maxCount = Math.max(0, ...Object.values(counts));

            const angleStep = (2 * Math.PI) / people.length;
            const nodes = people.map((p, i) => {
                const angle = i * angleStep - Math.PI / 2;
                return {
                    ...p,
                    x: radius * Math.cos(angle),
                    y: radius * Math.sin(angle),
                    count: counts[p.id] || 0
                };
            });

            const linkData = conflicts.map(([i, j]) => {
                const source = nodes.find(n => n.id === i);
                const target = nodes.find(n => n.id === j);
                return { source, target };
            });

            g.selectAll('.link')
                .data(linkData)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y)
                .style('stroke', d => getLinkColor(d.source.count, d.target.count, maxCount))
                .style('stroke-width', d => 1.8 + ((d.source.count + d.target.count) / 2) * 0.7)
                .on('click', function(event, d) {
                    const id1 = d.source.id;
                    const id2 = d.target.id;
                    conflicts = conflicts.filter(([a,b]) => !((a===id1 && b===id2) || (a===id2 && b===id1)));
                    drawGraph();
                    saveToFirebase();
                });

            const clickCounters = new Map();

            const nodeGroup = g.selectAll('.node')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x}, ${d.y})`)
                .style('cursor', 'grab');

            const circles = nodeGroup.append('circle')
                .attr('r', 22)  // уменьшили с 28 до 22
                .style('fill', d => getColorByCount(d.count, maxCount))
                .style('transition', 'fill 0.3s, stroke 0.2s')
                .attr('class', d => d.id === selectedId ? 'selected' : '')

            circles.on('mousedown', function(event, d) {
                event.preventDefault();
                const sourceNode = d;
                const startX = d.x;
                const startY = d.y;
                const dragLine = g.append('line')
                    .attr('class', 'drag-line')
                    .attr('x1', startX)
                    .attr('y1', startY)
                    .attr('x2', startX)
                    .attr('y2', startY);
                dragData = { sourceNode, line: dragLine };
                svg.on('mousemove', onDragMove);
                svg.on('mouseup', onDragEnd);
                svg.on('mouseleave', onDragEnd);
            })
            .on('click', function(event, d) {
                if (dragData) return;
                handleTap(d.id);
            })
            .on('touchstart', function(event, d) {
                event.preventDefault();
                handleTap(d.id);
            }, { passive: false })
            .on('mouseenter', function() { d3.select(this).transition().attr('r', 26); }) // был 32
            .on('mouseleave', function() { d3.select(this).transition().attr('r', 22); }); // был 28

            nodeGroup.append('text')
                .text(d => d.name)
                .style('font-size', '13px')  // уменьшили с 14
                .style('fill', '#fff')
                .style('text-anchor', 'middle')
                .style('dominant-baseline', 'central')
                .style('font-weight', '500')
                .style('pointer-events', 'none')
                .attr('dy', 1);

            function onDragMove(event) {
                if (!dragData) return;
                const [x, y] = d3.pointer(event, g.node());
                dragData.line.attr('x2', x).attr('y2', y);
            }

            function onDragEnd(event) {
                if (!dragData) return;
                dragData.line.remove();
                const [x, y] = d3.pointer(event, g.node());
                let targetNode = null;
                const threshold = 28; // немного уменьшили порог, т.к. кружки меньше
                for (const node of nodes) {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    if (Math.sqrt(dx*dx + dy*dy) < threshold) {
                        targetNode = node;
                        break;
                    }
                }
                if (targetNode && targetNode.id !== dragData.sourceNode.id) {
                    const id1 = dragData.sourceNode.id;
                    const id2 = targetNode.id;
                    const exists = conflicts.some(([a,b]) => (a===id1 && b===id2) || (a===id2 && b===id1));
                    if (!exists) {
                        conflicts.push([id1, id2]);
                        drawGraph();
                        saveToFirebase();
                    }
                }
                dragData = null;
                svg.on('mousemove', null);
                svg.on('mouseup', null);
                svg.on('mouseleave', null);
            }

            function handleTap(id) {
                if (!clickCounters.has(id)) {
                    clickCounters.set(id, { count: 0, timer: null });
                }
                const counter = clickCounters.get(id);
                counter.count++;
                if (counter.timer) clearTimeout(counter.timer);
                counter.timer = setTimeout(() => {
                    counter.count = 0;
                    counter.timer = null;
                }, 400);
                if (counter.count === 3) {
                    clearTimeout(counter.timer);
                    counter.count = 0;
                    counter.timer = null;
                    people = people.filter(p => p.id !== id);
                    conflicts = conflicts.filter(([a,b]) => a !== id && b !== id);
                    people.forEach((p, idx) => p.id = idx);
                    const idMap = {};
                    people.forEach((p, idx) => idMap[p.id] = idx);
                    conflicts = conflicts.map(([a,b]) => [idMap[a], idMap[b]]).filter(([a,b]) => a !== undefined && b !== undefined);
                    if (selectedId === id) selectedId = null;
                    drawGraph();
                    saveToFirebase();
                    return;
                }
                if (selectedId === null) {
                    selectedId = id;
                    d3.selectAll('.node circle').classed('selected', d => d.id === selectedId);
                } else if (selectedId === id) {
                    selectedId = null;
                    d3.selectAll('.node circle').classed('selected', false);
                } else {
                    const id1 = selectedId;
                    const id2 = id;
                    const exists = conflicts.some(([a,b]) => (a===id1 && b===id2) || (a===id2 && b===id1));
                    if (!exists) {
                        conflicts.push([id1, id2]);
                        drawGraph();
                        saveToFirebase();
                    }
                    selectedId = null;
                    d3.selectAll('.node circle').classed('selected', false);
                }
            }

            updateTop();
        }

        document.getElementById('addPerson').addEventListener('click', () => {
            const input = document.getElementById('newName');
            const name = input.value.trim();
            if (!name) return alert('Введите имя');
            if (people.some(p => p.name === name)) return alert('Такое имя уже есть');
            const newId = people.length ? Math.max(...people.map(p => p.id)) + 1 : 0;
            people.push({ id: newId, name });
            input.value = '';
            drawGraph();
            saveToFirebase();
        });

        document.getElementById('newName').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('addPerson').click();
        });

        loadFromFirebase();

        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        window.addEventListener('resize', drawGraph);
    </script>
</body>
</html>
