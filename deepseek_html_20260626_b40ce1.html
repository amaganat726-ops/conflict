<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карта конфликтов</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ---------- Общие стили ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #0f0f1a);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        h1 {
            font-weight: 300;
            font-size: 2.4rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(247, 151, 30, 0.2);
        }

        /* ---------- Панель управления ---------- */
        #controls {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        #controls input {
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 15px;
            flex: 1;
            min-width: 160px;
            transition: border 0.3s, box-shadow 0.3s;
        }

        #controls input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        #controls input:focus {
            outline: none;
            border-color: #f7971e;
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.15);
        }

        #controls button {
            padding: 10px 22px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);
        }

        #controls button:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 25px rgba(247, 151, 30, 0.5);
        }

        #controls button:active {
            transform: scale(0.96);
        }

        /* ---------- Контейнер графа ---------- */
        #graph-container {
            width: 100%;
            max-width: 750px;
            aspect-ratio: 1/1;
            background: radial-gradient(circle at center, #1e1e32, #12121f);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 0 60px rgba(247, 151, 30, 0.03);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.4s;
        }

        #graph-container:hover {
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(247, 151, 30, 0.06);
        }

        .empty-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* ---------- Стили D3-элементов ---------- */
        .link {
            stroke-opacity: 0.85;
            stroke-linecap: round;
            cursor: pointer;
            transition: stroke-width 0.25s ease, stroke-opacity 0.25s ease, filter 0.3s;
            filter: drop-shadow(0 0 6px rgba(255, 100, 50, 0.15));
        }

        .link:hover {
            stroke-width: 6px !important;
            stroke-opacity: 1;
            filter: drop-shadow(0 0 16px rgba(255, 100, 50, 0.5));
        }

        .drag-line {
            stroke: #ffd200;
            stroke-width: 3px;
            stroke-dasharray: 8 6;
            stroke-opacity: 0.9;
            pointer-events: none;
            filter: drop-shadow(0 0 12px rgba(255, 210, 0, 0.6));
        }

        .node circle {
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2.5px;
            cursor: grab;
            transition: r 0.25s ease, filter 0.3s, stroke-width 0.2s;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        .node circle:hover {
            filter: drop-shadow(0 0 24px rgba(247, 151, 30, 0.5));
            stroke-width: 3px;
        }

        .node circle:active {
            cursor: grabbing;
        }

        .node text {
            fill: #fff;
            font-size: 14px;
            font-weight: 500;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9), 0 0 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.3px;
        }

        /* ---------- Легенда ---------- */
        .legend {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px 40px;
            justify-content: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 28px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .legend-hint {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            margin-left: 4px;
        }

        /* ---------- ТОП по конфликтам ---------- */
        #top-container {
            width: 100%;
            max-width: 750px;
            margin-top: 24px;
            background: rgba(26, 26, 46, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        #top-container h2 {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 0 0 16px 0;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #top-container h2 span {
            font-size: 1.4rem;
        }

        .top-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .top-item {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
            gap: 12px;
        }

        .top-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .top-rank {
            font-weight: 600;
            font-size: 1rem;
            min-width: 36px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .top-rank.gold { color: #ffd700; }
        .top-rank.silver { color: #c0c0c0; }
        .top-rank.bronze { color: #cd7f32; }

        .top-name {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
        }

        .top-bar {
            flex: 2;
            height: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            position: relative;
        }

        .top-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
        }

        .top-count {
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 40px;
            text-align: right;
            color: rgba(255, 255, 255, 0.7);
        }

        .top-empty {
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            padding: 20px 0;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* ---------- Адаптивность ---------- */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #controls {
                padding: 12px 16px;
                border-radius: 30px;
                gap: 8px;
                max-width: 100%;
            }
            #controls input {
                font-size: 13px;
                padding: 8px 14px;
                min-width: 120px;
            }
            #controls button {
                font-size: 13px;
                padding: 8px 16px;
            }
            .legend {
                font-size: 12px;
                padding: 10px 18px;
                gap: 16px;
            }
            .node text { font-size: 11px; }
            #top-container { padding: 16px; }
            .top-item { flex-wrap: wrap; gap: 6px; }
            .top-bar { flex: 1 1 100%; order: 3; }
            .top-rank { min-width: 28px; }
            .top-count { min-width: 30px; }
        }
    </style>
</head>
<body>
    <h1>🌀 Карта конфликтов</h1>

    <div id="controls">
        <input type="text" id="newName" placeholder="Имя участника" />
        <button id="addPerson">➕ Добавить</button>
    </div>

    <div id="graph-container">
        <div class="empty-msg">➕ Добавьте участников</div>
    </div>

    <div class="legend">
        <span class="legend-item">
            <span class="color-dot" style="background: #2ecc71;"></span> мало
        </span>
        <span class="legend-item">
            <span class="color-dot" style="background: #f1c40f;"></span> средне
        </span>
        <span class="legend-item">
            <span class="color-dot" style="background: #e74c3c;"></span> много
        </span>
        <span class="legend-hint">
            ⚡ перетащи — создать · клик по линии — удалить · 3 клика по кругу — удалить участника
        </span>
    </div>

    <!-- Блок ТОП -->
    <div id="top-container">
        <h2><span>🏆</span> ТОП по конфликтам</h2>
        <div id="top-list" class="top-list">
            <div class="top-empty">Нет участников</div>
        </div>
    </div>

    <script>
        // ---------- Данные ----------
        let people = [];
        let conflicts = [];

        // ---------- Цветовые функции ----------
        function getColorByCount(count, maxCount) {
            if (maxCount === 0) return '#2ecc71';
            const ratio = count / maxCount;
            const r = Math.min(1, ratio * 2);
            const g = Math.min(1, 2 - ratio * 2);
            const b = 0.2;
            return `rgb(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)})`;
        }

        function getLinkColor(count1, count2, maxCount) {
            const sum = count1 + count2;
            const maxSum = maxCount * 2;
            if (maxSum === 0) return '#888';
            const ratio = sum / maxSum;
            const r = Math.min(1, ratio * 2);
            const g = Math.min(1, 2 - ratio * 2);
            const b = 0.2;
            return `rgb(${Math.round(r * 255)}, ${Math.round(g * 255)}, ${Math.round(b * 255)})`;
        }

        // ---------- Подсчёт конфликтов ----------
        function getConflictCounts() {
            const count = {};
            people.forEach(p => count[p.id] = 0);
            conflicts.forEach(([a, b]) => {
                count[a] = (count[a] || 0) + 1;
                count[b] = (count[b] || 0) + 1;
            });
            return count;
        }

        // ---------- Обновление ТОП ----------
        function updateTop() {
            const listEl = document.getElementById('top-list');
            if (people.length === 0) {
                listEl.innerHTML = '<div class="top-empty">Нет участников</div>';
                return;
            }

            const counts = getConflictCounts();
            const maxCount = Math.max(0, ...Object.values(counts));

            const sorted = people.slice().sort((a, b) => counts[b.id] - counts[a.id]);

            let html = '';
            sorted.forEach((p, index) => {
                const rank = index + 1;
                const count = counts[p.id] || 0;
                const percent = maxCount > 0 ? (count / maxCount) * 100 : 0;

                let rankClass = '';
                let rankSymbol = rank;
                if (rank === 1) { rankClass = 'gold'; rankSymbol = '🥇'; }
                else if (rank === 2) { rankClass = 'silver'; rankSymbol = '🥈'; }
                else if (rank === 3) { rankClass = 'bronze'; rankSymbol = '🥉'; }

                html += `
                    <div class="top-item">
                        <div class="top-rank ${rankClass}">${rankSymbol}</div>
                        <div class="top-name">${p.name}</div>
                        <div class="top-bar">
                            <div class="top-bar-fill" style="width: ${percent}%;"></div>
                        </div>
                        <div class="top-count">${count}</div>
                    </div>
                `;
            });

            listEl.innerHTML = html;
        }

        // ---------- Отрисовка графа ----------
        let dragData = null;

        function drawGraph() {
            const container = document.getElementById('graph-container');
            const width = container.clientWidth || 700;
            const height = container.clientHeight || 700;
            const radius = Math.min(width, height) / 2 - 65;

            d3.select(container).selectAll('*').remove();

            if (people.length === 0) {
                container.innerHTML = '<div class="empty-msg">➕ Добавьте участников</div>';
                updateTop();
                return;
            }

            const svg = d3.select(container)
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .style('display', 'block');

            const g = svg.append('g')
                .attr('transform', `translate(${width / 2}, ${height / 2})`);

            const counts = getConflictCounts();
            const maxCount = Math.max(0, ...Object.values(counts));

            // Расположение по кругу
            const angleStep = (2 * Math.PI) / people.length;
            const nodes = people.map((p, i) => {
                const angle = i * angleStep - Math.PI / 2;
                return {
                    ...p,
                    x: radius * Math.cos(angle),
                    y: radius * Math.sin(angle),
                    count: counts[p.id] || 0
                };
            });

            // Линии
            const linkData = conflicts.map(([i, j]) => {
                const source = nodes.find(n => n.id === i);
                const target = nodes.find(n => n.id === j);
                return { source, target };
            });

            g.selectAll('.link')
                .data(linkData)
                .enter()
                .append('line')
                .attr('class', 'link')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y)
                .style('stroke', d => {
                    const c1 = d.source.count;
                    const c2 = d.target.count;
                    return getLinkColor(c1, c2, maxCount);
                })
                .style('stroke-width', d => {
                    const c1 = d.source.count;
                    const c2 = d.target.count;
                    const avg = (c1 + c2) / 2;
                    return 1.8 + avg * 0.7;
                })
                .on('click', function(event, d) {
                    const id1 = d.source.id;
                    const id2 = d.target.id;
                    conflicts = conflicts.filter(([a, b]) => !((a === id1 && b === id2) || (a === id2 && b === id1)));
                    drawGraph();
                });

            // Узлы
            // Переменные для подсчёта кликов (для каждого узла свой счётчик)
            // Будем хранить в данных узла или в замыкании. Используем Map.
            const clickCounters = new Map();

            const nodeGroup = g.selectAll('.node')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'node')
                .attr('transform', d => `translate(${d.x}, ${d.y})`)
                .style('cursor', 'grab');

            nodeGroup.append('circle')
                .attr('r', 28)
                .style('fill', d => getColorByCount(d.count, maxCount))
                .style('transition', 'fill 0.3s')
                .on('mousedown', function(event, d) {
                    // Начинаем перетаскивание
                    event.preventDefault();
                    const sourceNode = d;
                    const startX = d.x;
                    const startY = d.y;

                    const dragLine = g.append('line')
                        .attr('class', 'drag-line')
                        .attr('x1', startX)
                        .attr('y1', startY)
                        .attr('x2', startX)
                        .attr('y2', startY);

                    dragData = {
                        sourceNode: sourceNode,
                        line: dragLine
                    };

                    svg.on('mousemove', onDragMove);
                    svg.on('mouseup', onDragEnd);
                    svg.on('mouseleave', onDragEnd);
                })
                .on('click', function(event, d) {
                    // Обработка тройного клика
                    const id = d.id;
                    if (!clickCounters.has(id)) {
                        clickCounters.set(id, { count: 0, timer: null });
                    }
                    const counter = clickCounters.get(id);
                    counter.count++;

                    // Сбрасываем таймер, если он был
                    if (counter.timer) {
                        clearTimeout(counter.timer);
                        counter.timer = null;
                    }

                    // Устанавливаем новый таймер на 400 мс
                    counter.timer = setTimeout(() => {
                        counter.count = 0;
                        counter.timer = null;
                    }, 400);

                    if (counter.count === 3) {
                        // Удаляем участника
                        // Сброс счётчика и таймера
                        clearTimeout(counter.timer);
                        counter.count = 0;
                        counter.timer = null;

                        // Удаляем участника
                        people = people.filter(p => p.id !== id);
                        conflicts = conflicts.filter(([a, b]) => a !== id && b !== id);
                        people.forEach((p, idx) => p.id = idx);
                        const idMap = {};
                        people.forEach((p, idx) => idMap[p.id] = idx);
                        conflicts = conflicts.map(([a, b]) => [idMap[a], idMap[b]]).filter(([a, b]) => a !== undefined && b !== undefined);
                        drawGraph();
                    }
                })
                .on('mouseenter', function() {
                    d3.select(this).transition().attr('r', 32);
                })
                .on('mouseleave', function() {
                    d3.select(this).transition().attr('r', 28);
                });

            nodeGroup.append('text')
                .text(d => d.name)
                .style('font-size', '14px')
                .style('fill', '#fff')
                .style('text-anchor', 'middle')
                .style('dominant-baseline', 'central')
                .style('font-weight', '500')
                .style('pointer-events', 'none')
                .attr('dy', 1);

            // Drag-обработчики
            function onDragMove(event) {
                if (!dragData) return;
                const [x, y] = d3.pointer(event, g.node());
                dragData.line
                    .attr('x2', x)
                    .attr('y2', y);
            }

            function onDragEnd(event) {
                if (!dragData) return;
                dragData.line.remove();

                const [x, y] = d3.pointer(event, g.node());
                let targetNode = null;
                const threshold = 34;
                for (const node of nodes) {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < threshold) {
                        targetNode = node;
                        break;
                    }
                }

                if (targetNode && targetNode.id !== dragData.sourceNode.id) {
                    const id1 = dragData.sourceNode.id;
                    const id2 = targetNode.id;
                    const exists = conflicts.some(([a, b]) => (a === id1 && b === id2) || (a === id2 && b === id1));
                    if (!exists) {
                        conflicts.push([id1, id2]);
                        drawGraph();
                    }
                }

                dragData = null;
                svg.on('mousemove', null);
                svg.on('mouseup', null);
                svg.on('mouseleave', null);
            }

            // Обновляем ТОП после отрисовки
            updateTop();
        }

        // ---------- Обработчики UI ----------
        document.getElementById('addPerson').addEventListener('click', () => {
            const input = document.getElementById('newName');
            const name = input.value.trim();
            if (!name) return alert('Введите имя');
            if (people.some(p => p.name === name)) return alert('Такое имя уже есть');
            const newId = people.length ? Math.max(...people.map(p => p.id)) + 1 : 0;
            people.push({ id: newId, name });
            input.value = '';
            drawGraph();
        });

        document.getElementById('newName').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('addPerson').click();
        });

        // Первоначальная отрисовка
        drawGraph();

        // Перерисовка при изменении размера окна
        window.addEventListener('resize', drawGraph);
    </script>
</body>
</html>
